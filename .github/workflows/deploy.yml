name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build
        env:
          PAGES_BASE_PATH: /kay-landing
          NEXT_PUBLIC_FORMSUBMIT_EMAIL: ${{ secrets.NEXT_PUBLIC_FORMSUBMIT_EMAIL }}
          NEXT_PUBLIC_PLAUSIBLE_DOMAIN: srbdp.github.io
          NEXT_PUBLIC_NURTURE_WEBHOOK_URL: https://kay-nurture-drip.fly.dev/webhook
      - uses: actions/upload-pages-artifact@v3
        with:
          path: out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
